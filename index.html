<!doctype html>
<html lang="en" data-theme="turkish">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CafeHub – Find Your Perfect Cafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-bg">
    <script>
      (function () {
        var stored = localStorage.getItem('cafehub-color-theme');
        if (stored === 'core' || stored === 'turkish') document.documentElement.dataset.theme = stored;
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
